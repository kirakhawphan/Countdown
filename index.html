<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Countdown Layout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Settings Button -->
    <button id="settings-btn" class="settings-btn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
        </svg>
    </button>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Timer Configuration</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>

            <div class="settings-group">
                <label>Topic / Event Name</label>
                <input type="text" id="input-topic" class="text-input" placeholder="Enter topic name..." value="KUY">
            </div>

            <div class="time-inputs" style="margin-bottom: 20px;">
                <div class="input-group">
                    <label>Hours</label>
                    <input type="number" id="input-hours" min="0" max="99" value="00">
                </div>
                <div class="separator-input">:</div>
                <div class="input-group">
                    <label>Minutes</label>
                    <input type="number" id="input-minutes" min="0" max="59" value="05">
                </div>
                <div class="separator-input">:</div>
                <div class="input-group">
                    <label>Seconds</label>
                    <input type="number" id="input-seconds" min="0" max="59" value="00">
                </div>
            </div>


        </div>
    </div>

    <!-- Main Layout -->
    <div class="layout-container">
        <!-- Background Effects -->
        <div class="bg-glow glow-1"></div>
        <div class="bg-glow glow-2"></div>

        <!-- Top section: 4 Logos -->
        <header class="logo-container">
            <!-- ไฟล์รูปโลโก้ถูกตั้งค่าให้อ่านจากโฟลเดอร์ Pic -->
            <div class="logo-box"><img src="Logo/logo1.png" alt="Logo 1"></div>
            <div class="logo-box"><img src="Logo/logo2.png" alt="Logo 2"></div>
            <div class="logo-box"><img src="Logo/logo3.png" alt="Logo 3"></div>
            <div class="logo-box"><img src="Logo/logo4.png" alt="Logo 4"></div>
        </header>

        <!-- Countdown section -->
        <main class="countdown-container">
            <div class="time-display" id="timer-display">
                <span id="hours">00</span><span class="separator">:</span><span id="minutes">00</span><span
                    class="separator">:</span><span id="seconds">00</span><span class="separator">:</span><span
                    id="milliseconds">00</span>
            </div>
        </main>

        <!-- Topic divider -->
        <div class="topic-divider">
            <div class="line"></div>
            <div class="topic-text" contenteditable="true" spellcheck="false">KUY</div>
            <div class="line"></div>
        </div>

        <!-- Bottom section: Song Info and Controls -->
        <footer class="bottom-bar">
            <div class="song-info-container">
                <div class="song-image-circle">
                    <img id="current-song-img" src="https://via.placeholder.com/90/222/fff?text=MUSIC" alt="Song Cover"
                        class="song-img">
                </div>
                <div class="song-details">
                    <div class="song-row" style="position: relative;">
                        <span class="label">Name</span>
                        <span id="current-song-name" class="dots"
                            style="min-width: 250px; display: inline-block; padding-bottom: 4px; cursor: pointer; border-bottom: 1px dashed rgba(255,255,255,0.3);"
                            title="Click to select song">พิมพ์ชื่อเพลงที่นี่...</span>
                        <div id="playlist-dropdown"
                            style="display: none; position: absolute; bottom: 100%; left: 0; background: rgba(10,10,15,0.95); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px; width: 300px; max-height: 250px; overflow-y: auto; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
                            <!-- List injected by JS -->
                        </div>
                    </div>
                    <div class="song-row" style="position: relative;">
                        <span class="label">Credit</span>
                        <span id="current-song-credit" class="dots"
                            style="min-width: 250px; display: inline-block; padding-bottom: 4px;">พิมพ์ชื่อศิลปินที่นี่...</span>
                    </div>
                    <div class="song-row" style="margin-top: 5px; gap: 10px; width: 100%;">
                        <span id="song-current-time"
                            style="font-size: 0.8rem; color: #888; font-family: var(--font-mono); min-width: 40px;">0:00</span>
                        <input type="range" id="song-seek-bar" min="0" max="100" value="0"
                            style="flex-grow: 1; height: 4px; border-radius: 2px; cursor: pointer; accent-color: var(--accent); background: rgba(255,255,255,0.2); outline: none; -webkit-appearance: none;">
                        <span id="song-total-time"
                            style="font-size: 0.8rem; color: #888; font-family: var(--font-mono); min-width: 40px;">0:00</span>
                    </div>
                </div>
            </div>

            <div class="timer-controls">
                <button id="btn-start" class="btn primary">START</button>
                <button id="btn-pause" class="btn secondary" disabled>PAUSE</button>
                <button id="btn-reset" class="btn danger">RESET</button>
            </div>
        </footer>
    </div>

    <!-- Audio Element for Song -->
    <audio id="bg-music" preload="auto"></audio>

    <script src="playlist.js"></script>
    <script src="script.js"></script>
</body>

</html>
